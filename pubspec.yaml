name: pdf_editor
description: A production-grade PDF editor for Android & Windows
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── PDF VIEWING (pdfrx / PDFium) ─────────────────────────────────────────
  # Used for: PdfViewer widget, text extraction via loadStructuredText()
  pdfrx: ^2.2.24

  # ── PDF WRITING (Syncfusion) ─────────────────────────────────────────────
  # Used for: saving annotations + redacting and redrawing text edits.
  # pdfrx has NO write/annotation API from Dart, so we keep Syncfusion
  # for the save path only.
  syncfusion_flutter_pdf: ^26.1.35

  # ── File system ───────────────────────────────────────────────────────────
  file_picker: ^10.3.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.0

  # ── State management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── UI / UX ───────────────────────────────────────────────────────────────
  flutter_colorpicker: ^1.1.0
  google_fonts: ^6.2.1

  # ── Utilities ─────────────────────────────────────────────────────────────
  uuid: ^4.5.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # share_plus 12.x fixes the web ^1.1.x conflict with pdfrx.
  # Breaking API: use SharePlus.instance.share(ShareParams(...)).
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.2
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
