name: pdf_editor
description: A production-grade PDF editor for Android & Windows
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── PDF rendering & editing ──────────────────────────────────────────────
  syncfusion_flutter_pdfviewer: ^26.1.35  # PDF rendering in viewer widget
  syncfusion_flutter_pdf: ^26.1.35        # PDF read/write for saving annotations

  # ── File system ──────────────────────────────────────────────────────────
  file_picker: ^8.0.3          # Native file browser (Android + Windows)
  path_provider: ^2.1.3        # App documents / cache directories
  permission_handler: ^11.3.1  # Android storage permissions

  # ── State management ─────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── UI / UX ───────────────────────────────────────────────────────────────
  flutter_colorpicker: ^1.1.0  # Color picker dialog
  google_fonts: ^6.2.1         # Inter font

  # ── Utilities ─────────────────────────────────────────────────────────────
  uuid: ^4.4.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  share_plus: ^9.0.0           # System share sheet

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/icons/
