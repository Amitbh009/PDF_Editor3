name: Build PDF Editor (PDFium)

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# Global environment
# ─────────────────────────────────────────────────────────────────────────────
env:
  # Latest Flutter stable as of March 2026.
  # Flutter 3.41 ships with Dart 3.7, AGP 8.9 support, NDK 27.
  # DO NOT use 3.29.x — pdfrx 2.2+ requires Dart 3.7 / Flutter 3.41+.
  FLUTTER_VERSION: '3.41.2'
  JAVA_VERSION: '17'

  # NDK version pinned explicitly.
  # flutter.ndkVersion in build.gradle is unreliable across CI images.
  # NDK 27.0.12077973 is the version Flutter 3.41 sets for flutter.ndkVersion
  # AND the highest version required by any plugin in this project
  # (pdfrx, permission_handler, path_provider all need >= 27.x).
  # NDK versions are backward compatible — using the highest required is safe.
  NDK_VERSION: '27.0.12077973'

jobs:

  # ── Code quality gate ────────────────────────────────────────────────────────
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (freezed / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

  # ── Android APK + AAB ────────────────────────────────────────────────────────
  build-android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      # Java MUST be set up before Flutter so Gradle uses Temurin 17,
      # not whatever the runner ships by default.
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      # ── FIX 1: NDK licence + install ────────────────────────────────────────
      # WHY THIS FAILS WITHOUT THIS STEP:
      # pdfrx's Kotlin bridge requires NDK 27.0.12077973.
      # ubuntu-latest only ships NDK 23.x.
      # Gradle tries to auto-download NDK 27 but aborts with:
      #   "LicenceNotAcceptedException: ndk;27.0.12077973"
      # because SDK licences are not pre-accepted on CI runners.
      # SOLUTION: Accept all SDK licences first, then install NDK 27 explicitly.
      - name: Accept Android SDK licences
        run: |
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            --licenses > /dev/null 2>&1 || true

      - name: Install NDK ${{ env.NDK_VERSION }}
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}"

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      # ── FIX 2: WASM removal — AFTER pub get, BEFORE build ───────────────────
      # WHY ORDER MATTERS:
      # dart run pdfrx:remove_wasm_modules is a script inside the pdfrx package.
      # It only exists after `flutter pub get` has run.
      # Running it before pub get causes "No such file" errors.
      # Only strip WASM on release builds — keeps debug CI fast.
      - name: Remove pdfrx WASM modules (release only)
        if: startsWith(github.ref, 'refs/tags/')
        run: dart run pdfrx:remove_wasm_modules

      - name: Decode keystore (release only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/keystore.jks
          echo "KEYSTORE_PATH=$PWD/android/app/keystore.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}"  >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"                  >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"            >> $GITHUB_ENV

      - name: Build Debug APK (non-tag)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: flutter build apk --debug --split-per-abi

      - name: Build Release APK (tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          flutter build apk --release \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-info/android/

      - name: Build Release AAB (tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          flutter build appbundle --release \
            --obfuscate \
            --split-debug-info=build/debug-info/android/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14

      - name: Upload AAB artifact (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.sha }}
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload debug symbols (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-symbols-${{ github.sha }}
          path: build/debug-info/android/
          retention-days: 90

  # ── Windows EXE + Installer ──────────────────────────────────────────────────
  build-windows:
    name: Windows (EXE + Installer)
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      # ── FIX 3: WASM removal — AFTER pub get, BEFORE build ───────────────────
      - name: Remove pdfrx WASM modules (release only)
        if: startsWith(github.ref, 'refs/tags/')
        run: dart run pdfrx:remove_wasm_modules

      # Developer Mode note:
      # pdfrx uses symlinks during its CMake step.
      # windows-latest runners already have SeCreateSymbolicLinkPrivilege,
      # so NO extra step is needed here on GitHub-hosted runners.
      # Self-hosted Windows runners require Developer Mode enabled manually.

      - name: Build Windows release
        shell: pwsh
        run: |
          flutter build windows --release `
            --obfuscate `
            --split-debug-info=build/debug-info/windows/

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          $dst = "PDFEditor-Windows-Portable"
          New-Item -ItemType Directory -Path $dst -Force
          Copy-Item -Recurse "$src\*" "$dst\"
          Compress-Archive -Path $dst `
            -DestinationPath "PDFEditor-Portable-${{ github.ref_name }}.zip"

      - name: Install NSIS (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        run: choco install nsis -y --no-progress

      - name: Write NSIS script (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          @"
          !define APP_NAME "PDF Editor"
          !define APP_VERSION "$version"
          !define APP_PUBLISHER "PDF Editor"
          !define APP_URL "https://github.com/${{ github.repository }}"
          !define APP_EXE "pdf_editor.exe"
          !define BUILD_DIR "build\windows\x64\runner\Release"
          !define INST_KEY "Software\Microsoft\Windows\CurrentVersion\Uninstall\PDFEditor"
          Unicode True
          Name "`${APP_NAME} `${APP_VERSION}"
          OutFile "PDFEditor-Setup-`${APP_VERSION}.exe"
          InstallDir "`$PROGRAMFILES64\`${APP_NAME}"
          InstallDirRegKey HKCU "`${INST_KEY}" "InstallLocation"
          RequestExecutionLevel admin
          SetCompressor /SOLID lzma
          !include "MUI2.nsh"
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"
          Section "PDF Editor" SecMain
            SetOutPath "`$INSTDIR"
            File /r "`${BUILD_DIR}\*.*"
            CreateDirectory "`$SMPROGRAMS\`${APP_NAME}"
            CreateShortcut "`$SMPROGRAMS\`${APP_NAME}\`${APP_NAME}.lnk" "`$INSTDIR\`${APP_EXE}"
            CreateShortcut "`$SMPROGRAMS\`${APP_NAME}\Uninstall.lnk" "`$INSTDIR\Uninstall.exe"
            CreateShortcut "`$DESKTOP\`${APP_NAME}.lnk" "`$INSTDIR\`${APP_EXE}"
            WriteRegStr HKCU "`${INST_KEY}" "DisplayName" "`${APP_NAME}"
            WriteRegStr HKCU "`${INST_KEY}" "DisplayVersion" "`${APP_VERSION}"
            WriteRegStr HKCU "`${INST_KEY}" "Publisher" "`${APP_PUBLISHER}"
            WriteRegStr HKCU "`${INST_KEY}" "URLInfoAbout" "`${APP_URL}"
            WriteRegStr HKCU "`${INST_KEY}" "InstallLocation" "`$INSTDIR"
            WriteRegStr HKCU "`${INST_KEY}" "UninstallString" "`$INSTDIR\Uninstall.exe"
            WriteRegDWORD HKCU "`${INST_KEY}" "NoModify" 1
            WriteRegDWORD HKCU "`${INST_KEY}" "NoRepair" 1
            WriteUninstaller "`$INSTDIR\Uninstall.exe"
          SectionEnd
          Section "Uninstall"
            Delete "`$INSTDIR\Uninstall.exe"
            RMDir /r "`$INSTDIR"
            Delete "`$DESKTOP\`${APP_NAME}.lnk"
            RMDir /r "`$SMPROGRAMS\`${APP_NAME}"
            DeleteRegKey HKCU "`${INST_KEY}"
          SectionEnd
          "@ | Out-File -FilePath installer.nsi -Encoding UTF8

      - name: Build NSIS installer (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        run: makensis installer.nsi

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-${{ github.sha }}
          path: PDFEditor-Portable-*.zip
          retention-days: 14

      - name: Upload installer (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ github.sha }}
          path: PDFEditor-Setup-*.exe
          retention-days: 30

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PDF Editor ${{ github.ref_name }}"
          body: |
            ## PDF Editor ${{ github.ref_name }}
            A full-featured PDF editor for Android & Windows, powered by PDFium.
            ### Requirements
            - **Android**: 6.0+ (API 23)
            - **Windows**: Windows 10 64-bit or newer
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/**/*.apk
            dist/**/*.aab
            dist/**/*.exe
            dist/**/*.zip
