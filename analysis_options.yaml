# analysis_options.yaml — dart analyzer configuration

include: package:flutter_lints/flutter.yaml

analyzer:
  # Exclude generated Freezed files and any backup/patch folders that
  # may exist inside the project directory from previous migrations.
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "backup_*/**"
    - "**/backup_before_patch*/**"
    - "**/backup_*/**"

linter:
  rules:
    # Enforce await on unawaited futures
    unawaited_futures: true
    # Prefer const constructors
    prefer_const_constructors: true
    prefer_const_declarations: true
