plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.pdfeditor.app"
    compileSdk 36

    // FIX: Pin NDK version explicitly instead of using flutter.ndkVersion.
    // flutter.ndkVersion varies by Flutter version and CI image.
    // NDK 27.0.12077973 is required by pdfrx, permission_handler, and
    // path_provider_android. Pinning here prevents the mismatch error:
    //   "Your project is configured with NDK X but plugin Y requires NDK 27"
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.pdfeditor.app"
        minSdk 23
        targetSdk 36
        versionCode flutter.versionCode
        versionName flutter.versionName
        multiDexEnabled true
    }

    signingConfigs {
        release {
            def keystorePath = System.getenv("KEYSTORE_PATH")
            if (keystorePath) {
                storeFile     file(keystorePath)
                storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
                keyAlias      System.getenv("KEY_ALIAS")         ?: ""
                keyPassword   System.getenv("KEY_PASSWORD")      ?: ""
            } else {
                // Fall back to debug keystore for non-tag CI builds
                storeFile     file("${System.getProperty('user.home')}/.android/debug.keystore")
                storePassword "android"
                keyAlias      "androiddebugkey"
                keyPassword   "android"
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    // FIX: Updated Kotlin stdlib from 1.9.10 to 2.1.0 to match
    // settings.gradle kotlin plugin version. Mismatched versions cause:
    //   "Kotlin stdlib version mismatch" compile error.
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.1.0"
    implementation "androidx.multidex:multidex:2.0.1"
}
