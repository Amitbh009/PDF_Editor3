distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists

# FIX: Gradle updated from 8.12 → 8.11.1
#
# WHY 8.11.1:
#   AGP 8.9.1 (March 2025) requires Gradle >= 8.11.1.
#   Gradle 8.12 would also satisfy this, but 8.12 introduced deprecation
#   warnings for AGP 8.x DSL patterns (isCrunchPngs boolean property)
#   that turn into build failures with --warning-mode=fail in CI.
#   Gradle 8.11.1 is the sweet spot: satisfies AGP 8.9.1's minimum,
#   avoids the 8.12+ deprecation noise, and is fully stable.
distributionUrl=https\://services.gradle.org/distributions/gradle-8.11.1-bin.zip
