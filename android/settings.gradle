pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        File localPropertiesFile = new File(rootProject.projectDir, "local.properties")
        if (!localPropertiesFile.exists()) {
            throw new GradleException("Missing local.properties file. Run `flutter pub get` first.")
        }
        localPropertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }

        def flutterSdk = properties.getProperty("flutter.sdk")
        if (flutterSdk == null) {
            throw new GradleException("flutter.sdk not set in local.properties")
        }
        return flutterSdk
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.10" apply false
}

include ":app"
