pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"

    // FIX: AGP updated from 8.3.0 → 8.7.3
    // 8.3.0 is incompatible with Gradle 8.12 and NDK 27.
    // 8.7.3 is the latest stable AGP that works with Flutter 3.41,
    // Gradle 8.12, and NDK 27. DO NOT upgrade to AGP 9.x —
    // Flutter 3.41 does not yet support AGP 9 (flutter/flutter#181383).
    id "com.android.application" version "8.7.3" apply false

    // FIX: Kotlin updated from 1.9.10 → 2.1.0
    // Flutter 3.41 requires Kotlin 2.x for its Gradle plugin.
    // Using 1.9.10 with AGP 8.7 causes:
    //   "Kotlin stdlib version mismatch" errors.
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
}

include ":app"
